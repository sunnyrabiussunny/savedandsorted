<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 300px; font-family: system-ui, sans-serif; background: #0f0f13; color: #e8e8f0; }
  .header { padding: 14px 16px; border-bottom: 1px solid #2e2e3a; display: flex; align-items: center; gap: 10px; }
  .logo { font-size: 15px; font-weight: 700; }
  .logo span { color: #7c6af7; }
  .status { margin-left: auto; font-size: 11px; padding: 2px 8px; border-radius: 10px; background: rgba(74,222,128,0.1); color: #4ade80; }
  .status.offline { background: rgba(248,113,113,0.1); color: #f87171; }
  .body { padding: 16px; }
  .info-row { font-size: 12px; color: #9090a8; margin-bottom: 12px; line-height: 1.5; }
  .btn { width: 100%; padding: 10px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 8px; transition: all 0.15s; }
  .btn-primary { background: #7c6af7; color: white; }
  .btn-primary:hover { background: #5b4fcf; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-ghost { background: #22222c; color: #9090a8; border: 1px solid #2e2e3a; }
  .btn-ghost:hover { border-color: #7c6af7; color: #7c6af7; }
  .msg { font-size: 12px; padding: 8px 10px; border-radius: 6px; margin-bottom: 10px; display: none; }
  .msg.success { background: rgba(74,222,128,0.1); color: #4ade80; border: 1px solid rgba(74,222,128,0.2); }
  .msg.error { background: rgba(248,113,113,0.1); color: #f87171; border: 1px solid rgba(248,113,113,0.2); }
  .msg.info { background: rgba(124,106,247,0.1); color: #7c6af7; border: 1px solid rgba(124,106,247,0.2); }
  hr { border: none; border-top: 1px solid #2e2e3a; margin: 12px 0; }
  .setting-label { font-size: 12px; color: #9090a8; margin-bottom: 6px; }
  input[type=text] { width: 100%; background: #22222c; border: 1px solid #2e2e3a; border-radius: 6px; padding: 7px 10px; color: #e8e8f0; font-size: 12px; outline: none; margin-bottom: 10px; }
  input[type=text]:focus { border-color: #7c6af7; }
  .footer { padding: 10px 16px; border-top: 1px solid #2e2e3a; display: flex; justify-content: space-between; align-items: center; }
  .footer a { font-size: 11px; color: #7c6af7; text-decoration: none; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">Saved<span>&</span>Sorted</div>
  <div class="status offline" id="statusBadge">Connecting...</div>
</div>
<div class="body">
  <div id="msg" class="msg"></div>
  <div class="info-row" id="pageInfo">Checking current page...</div>
  <button class="btn btn-primary" id="saveBtn" disabled>📌 Save This Post to Library</button>
  <hr>
  <div class="setting-label">NAS Address</div>
  <input type="text" id="nasUrl" placeholder="http://192.168.10.103:3131">
  <button class="btn btn-ghost" id="settingsBtn">Save Settings</button>
</div>
<div class="footer">
  <span style="font-size:11px;color:#5a5a72">AI tags slowly in background</span>
  <a id="libraryLink" href="#" target="_blank">Open Library →</a>
</div>
<script src="popup.js"></script>
</body>
</html>
